<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin · De Feu et d'Acier</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink: #0f1115;
      --panel: #171a21;
      --panel-2: #1f232c;
      --line: #2a2f3a;
      --text: #e7e9ee;
      --muted: #9aa1ad;
      --accent: #e0552c;
      --accent-hot: #f06b3a;
      --ok: #4ade80;
      --err: #f87171;
      --danger: #f87171;
      --field: #11141a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    button {
      font-family: inherit;
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      transition: background 150ms, border-color 150ms, color 150ms;
    }
    button:hover { background: #262b36; border-color: #3a4150; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary { background: var(--accent); color: #1a0903; border-color: var(--accent); font-weight: 600; }
    button.primary:hover { background: var(--accent-hot); border-color: var(--accent-hot); }
    button.danger { color: var(--danger); border-color: #4d2828; }
    button.danger:hover { background: #2a1818; }

    input[type="text"], input[type="password"], input[type="url"], input[type="number"], textarea {
      width: 100%;
      padding: 8px 10px;
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.45;
      transition: border-color 150ms;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 60px; }
    textarea.mono { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; font-size: 12.5px; }
    input[type="checkbox"] { width: 16px; height: 16px; }

    .muted  { color: var(--muted); }
    .small  { font-size: 12px; }
    .success { color: var(--ok); padding: 8px 12px; background: rgba(74,222,128,0.08); border-radius: 4px; }
    .error  { color: var(--err); padding: 8px 12px; background: rgba(248,113,113,0.08); border-radius: 4px; }
    .error.small { padding: 4px 0; background: none; }

    /* ── Login ───────────────────────────────────────── */
    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .login-card h1 { margin: 0; font-size: 22px; font-weight: 600; }
    .login-card label { display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: var(--muted); }
    .login-card button { background: var(--accent); color: #1a0903; border-color: var(--accent); font-weight: 600; padding: 10px; }
    .login-card button:hover:not(:disabled) { background: var(--accent-hot); }

    /* ── Admin shell ─────────────────────────────────── */
    .admin-shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .sidebar-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .sidebar-head button { font-size: 12px; padding: 5px 10px; }
    .sidebar nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .sidebar nav button {
      width: 100%;
      text-align: left;
      background: none;
      border: 0;
      border-radius: 0;
      padding: 10px 20px;
      color: var(--text);
      font-size: 13.5px;
      cursor: pointer;
      border-left: 2px solid transparent;
    }
    .sidebar nav button:hover { background: rgba(255,255,255,0.03); }
    .sidebar nav button.active {
      color: var(--accent);
      background: rgba(224,85,44,0.08);
      border-left-color: var(--accent);
    }
    .sidebar-foot {
      padding: 16px 20px;
      border-top: 1px solid var(--line);
      font-size: 12px;
    }
    .sidebar-foot a { color: var(--muted); text-decoration: none; }
    .sidebar-foot a:hover { color: var(--accent); }

    /* ── Main editor ─────────────────────────────────── */
    .main {
      padding: 32px 40px 80px;
      max-width: 880px;
      width: 100%;
    }
    .editor-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .editor-head h2 { margin: 0; font-size: 22px; font-weight: 600; }
    .editor-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .badge {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 10px;
      letter-spacing: 0.02em;
    }
    .badge-on  { background: rgba(74,222,128,0.12); color: var(--ok); }
    .badge-off { background: rgba(154,161,173,0.12); color: var(--muted); }

    .editor-fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 24px;
    }

    /* ── Fields ──────────────────────────────────────── */
    .field { display: flex; flex-direction: column; }
    .field > label { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 12.5px; font-weight: 600; color: var(--text); }
    .field-help { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .field-inline > label { flex-direction: row; align-items: center; gap: 10px; }
    .field-inline .field-label { font-weight: 500; }

    fieldset.nested {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 16px;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(255,255,255,0.015);
    }
    fieldset.nested legend {
      padding: 0 8px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--accent);
    }

    .tuple-row { display: grid; grid-template-columns: 1fr 1.5fr; gap: 8px; }

    .paragraphs { display: flex; flex-direction: column; gap: 8px; }
    .paragraph-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }
    .paragraph-actions { display: flex; flex-direction: column; gap: 4px; }
    .paragraph-actions button { padding: 4px 8px; font-size: 11px; }

    .html-preview {
      margin-top: 6px;
      padding: 10px 12px;
      background: var(--field);
      border: 1px dashed var(--line);
      border-radius: 4px;
      font-size: 13.5px;
      color: var(--muted);
    }
    .html-preview strong { color: var(--text); }
    .html-preview em     { color: var(--accent); font-style: italic; }

    /* ── Image picker ────────────────────────────────── */
    .img-picker { display: flex; flex-direction: column; gap: 8px; }
    .img-picker-row { display: grid; grid-template-columns: 1fr auto auto; gap: 6px; }
    .img-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 4px;
    }
    .img-preview img {
      max-width: 100px;
      max-height: 70px;
      object-fit: cover;
      border-radius: 2px;
      background: #000;
    }

    /* ── Array editor ────────────────────────────────── */
    .array { display: flex; flex-direction: column; gap: 8px; }
    .array-item {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: rgba(255,255,255,0.01);
    }
    .array-item-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 4px 4px 0;
    }
    .array-item-head .collapse {
      background: none;
      border: 0;
      color: var(--text);
      text-align: left;
      flex: 1;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
    }
    .array-item-head .collapse:hover { background: rgba(255,255,255,0.03); color: var(--accent); }
    .array-item-actions { display: flex; gap: 4px; padding-right: 6px; }
    .array-item-actions button { padding: 4px 8px; font-size: 11px; }
    .array-item-body {
      padding: 16px;
      border-top: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(0,0,0,0.15);
    }

    /* ── Modal ───────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      max-width: 1000px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-head h2 { margin: 0; font-size: 18px; }
    .img-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .img-tile {
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .img-tile img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #000;
    }
    .img-tile-info { padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
    .img-tile-key { font-size: 12px; word-break: break-all; }
    .img-tile-actions { display: flex; gap: 6px; padding: 0 10px 10px; }
    .img-tile-actions button { flex: 1; font-size: 11px; padding: 5px 8px; }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 800px) {
      .admin-shell { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .sidebar nav { display: flex; overflow-x: auto; padding: 4px 8px; }
      .sidebar nav button { flex-shrink: 0; padding: 8px 12px; }
      .main { padding: 24px 20px 60px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script src="schemas.js"></script>
  <script type="text/babel" src="admin.jsx"></script>
</body>
</html>
